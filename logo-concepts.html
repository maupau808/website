<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow+Semi+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1c1c1c; font-family: Arial, sans-serif; padding: 40px; display: flex; flex-direction: column; gap: 60px; }
.label { color: #666; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
.row { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.swatch span { color: #555; font-size: 11px; letter-spacing: 1px; }
</style>
</head>
<body>

<!--
  Maui silhouette: two-lobe shape, narrow isthmus
  West Maui (upper-left, smaller) + East Maui/Haleakala (lower-right, larger)
  Designed to fit inside the P counter of Oswald Bold

  Technique: paint the letter, then paint the Maui shape on top in background color.
  No mask needed — works everywhere.
-->

<!-- ═══════════════════════════════════════
     CONCEPT A — Spaced letters, badge
════════════════════════════════════════ -->
<div>
  <div class="label">Concept A — Spaced letters, no stroke. Badge container.</div>
  <div class="row">

    <div class="swatch">
      <svg width="320" height="160" viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Maui shape sized/positioned for P counter in this SVG -->
          <!-- P is at x=108, font-size=118, baseline=134 -->
          <!-- Counter approx: x 128-175, y 20-76 -->
          <clipPath id="p-clip-a">
            <rect x="108" y="0" width="95" height="160"/>
          </clipPath>
        </defs>
        <rect width="320" height="160" rx="10" fill="#3c5148"/>
        <!-- M -->
        <text x="10" y="134" font-family="Oswald" font-weight="700" font-size="118" fill="#E8A820">M</text>
        <!-- P -->
        <text x="108" y="134" font-family="Oswald" font-weight="700" font-size="118" fill="#E8A820">P</text>
        <!-- Maui shape painted on top of P in background color = creates cutout -->
        <g transform="translate(128, 22) scale(0.44, 0.95)">
          <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="#3c5148"/>
        </g>
        <!-- E -->
        <text x="214" y="134" font-family="Oswald" font-weight="700" font-size="118" fill="#E8A820">E</text>
      </svg>
      <span>On dark green</span>
    </div>

    <div class="swatch">
      <svg width="320" height="160" viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
        <rect width="320" height="160" rx="10" fill="white"/>
        <text x="10" y="134" font-family="Oswald" font-weight="700" font-size="118" fill="#3c5148">M</text>
        <text x="108" y="134" font-family="Oswald" font-weight="700" font-size="118" fill="#3c5148">P</text>
        <g transform="translate(128, 22) scale(0.44, 0.95)">
          <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="white"/>
        </g>
        <text x="214" y="134" font-family="Oswald" font-weight="700" font-size="118" fill="#3c5148">E</text>
      </svg>
      <span>On white</span>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════
     CONCEPT B — Tight overlapping, thin gap
════════════════════════════════════════ -->
<div>
  <div class="label">Concept B — Tight/overlapping. Thin gap instead of stroke.</div>
  <div class="row">

    <div class="swatch">
      <svg width="270" height="155" viewBox="0 0 270 155" xmlns="http://www.w3.org/2000/svg">
        <rect width="270" height="155" fill="#3c5148"/>
        <text x="4"   y="132" font-family="Oswald" font-weight="700" font-size="118" fill="#E8A820">M</text>
        <text x="86"  y="132" font-family="Oswald" font-weight="700" font-size="118" fill="#E8A820">P</text>
        <!-- Maui cutout in P -->
        <g transform="translate(105, 20) scale(0.44, 0.95)">
          <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="#3c5148"/>
        </g>
        <text x="170" y="132" font-family="Oswald" font-weight="700" font-size="118" fill="#E8A820">E</text>
        <!-- thin gap lines between letters -->
        <rect x="86"  y="4" width="2" height="148" fill="#3c5148"/>
        <rect x="170" y="4" width="2" height="148" fill="#3c5148"/>
      </svg>
      <span>Dark green</span>
    </div>

    <div class="swatch">
      <svg width="270" height="155" viewBox="0 0 270 155" xmlns="http://www.w3.org/2000/svg">
        <rect width="270" height="155" fill="white"/>
        <text x="4"   y="132" font-family="Oswald" font-weight="700" font-size="118" fill="#3c5148">M</text>
        <text x="86"  y="132" font-family="Oswald" font-weight="700" font-size="118" fill="#3c5148">P</text>
        <g transform="translate(105, 20) scale(0.44, 0.95)">
          <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="white"/>
        </g>
        <text x="170" y="132" font-family="Oswald" font-weight="700" font-size="118" fill="#3c5148">E</text>
        <rect x="86"  y="4" width="2" height="148" fill="white"/>
        <rect x="170" y="4" width="2" height="148" fill="white"/>
      </svg>
      <span>White</span>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════
     CONCEPT C — Square icon / favicon
════════════════════════════════════════ -->
<div>
  <div class="label">Concept C — Square badge. Favicon / icon use.</div>
  <div class="row">

    <div class="swatch">
      <svg width="160" height="160" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="200" rx="18" fill="#3c5148"/>
        <text x="6"   y="170" font-family="Oswald" font-weight="700" font-size="148" fill="#E8A820">M</text>
        <text x="74"  y="170" font-family="Oswald" font-weight="700" font-size="148" fill="#E8A820">P</text>
        <g transform="translate(96, 28) scale(0.52, 1.1)">
          <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="#3c5148"/>
        </g>
        <text x="140" y="170" font-family="Oswald" font-weight="700" font-size="148" fill="#E8A820">E</text>
      </svg>
      <span>Full size</span>
    </div>

    <div class="swatch">
      <svg width="48" height="48" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="200" rx="18" fill="#3c5148"/>
        <text x="6"   y="170" font-family="Oswald" font-weight="700" font-size="148" fill="#E8A820">M</text>
        <text x="74"  y="170" font-family="Oswald" font-weight="700" font-size="148" fill="#E8A820">P</text>
        <g transform="translate(96, 28) scale(0.52, 1.1)">
          <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="#3c5148"/>
        </g>
        <text x="140" y="170" font-family="Oswald" font-weight="700" font-size="148" fill="#E8A820">E</text>
      </svg>
      <span>Favicon size</span>
    </div>

  </div>
</div>


<!-- ═══════════════════════════════════════
     HEADER MOCKUP
════════════════════════════════════════ -->
<div>
  <div class="label">How it sits in a website header next to the full wordmark.</div>
  <div class="row">
    <svg width="700" height="72" viewBox="0 0 700 72" xmlns="http://www.w3.org/2000/svg">
      <rect width="700" height="72" fill="#3c5148"/>
      <!-- Mini badge -->
      <rect x="12" y="8" width="56" height="56" rx="6" fill="#2e3d33"/>
      <text x="14"  y="58" font-family="Oswald" font-weight="700" font-size="50" fill="#E8A820">M</text>
      <text x="34"  y="58" font-family="Oswald" font-weight="700" font-size="50" fill="#E8A820">P</text>
      <g transform="translate(42, 13) scale(0.19, 0.42)">
        <path d="M 18,4 C 8,4 4,13 7,21 C 10,27 17,29 24,26 C 29,23 31,18 28,12 C 32,16 37,23 41,32 C 48,47 62,54 74,49 C 86,44 90,32 85,19 C 80,7 66,2 54,6 C 44,4 33,7 29,14 C 26,9 22,4 18,4 Z" fill="#2e3d33"/>
      </g>
      <text x="54"  y="58" font-family="Oswald" font-weight="700" font-size="50" fill="#E8A820">E</text>
      <!-- Wordmark -->
      <text x="82" y="34" font-family="Oswald" font-weight="700" font-size="21" fill="white" letter-spacing="1">MAUI POWER EQUIPMENT</text>
      <text x="83" y="55" font-family="Oswald" font-weight="400" font-size="12" fill="#7aab8a" letter-spacing="3">WHERE MAUI WORKS</text>
    </svg>
  </div>
</div>

</body>
</html>
